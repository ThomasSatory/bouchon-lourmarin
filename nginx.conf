server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss image/svg+xml;

  # Long cache for static assets (images / css / js / fonts)
  location ~* \.(?:jpg|jpeg|png|webp|avif|gif|svg|ico|css|js|woff2?|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SEO files (no aggressive cache)
  location = /robots.txt   { add_header Cache-Control "public, max-age=3600"; }
  location = /sitemap.xml  { add_header Cache-Control "public, max-age=3600"; }

  # HTML — short cache so updates propagate
  location / {
    add_header Cache-Control "public, max-age=300, must-revalidate";
    try_files $uri $uri/ /index.html;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
